server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: hmi-alarm-backend

  datasource:
    url: jdbc:h2:mem:hmidb;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  jackson:
    serialization:
      write-dates-as-timestamps: false

# JWT Configuration
jwt:
  # Base64-encoded HMAC-SHA256 secret (at least 256 bits). Replace in production via env variables.
  secret: ZG9udC11c2UtdGhpcy1zZWNyZXQtaW4tcHJvZHVjdGlvbi1obWktYWxhcm0tYm9hcmQtMjAyNS1zdXBlci1zZWN1cmU=
  expiration-ms: 86400000   # 24 hours
  issuer: hmi-alarm-board

# Alarm Generator Configuration
alarm:
  generator:
    enabled: true
    interval-ms: 15000   # generate a new alarm event every 15 seconds

logging:
  level:
    com.hmi.alarm: INFO
    org.springframework.security: WARN
